# Conda environment for MexicoMP REMARK
#
# This REMARK primarily compiles a LaTeX paper. The empirical estimation
# (Bayesian VAR, high-frequency identification) was performed outside this
# repository using proprietary data.
#
# This environment provides the minimal tooling needed to:
#   1. Run reproduce.sh (requires latexmk — install via system package manager)
#   2. Support any future Python-based analysis or visualization
#
# Create environment: conda env create -f binder/environment.yml
# Activate: conda activate mexicomp

name: mexicomp
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - statsmodels>=0.14
  - pip
