<span class='ecrm-1000'>Note: Marginal propensities to consume by wealth quartile (WQ), aggregate MPC, and capital-to-income
ratio. The model without the splurge is able to match the aggregate MPC reasonably well (0.49 vs
0.51 in data), but does so by missing the MPCs in the different wealth quartiles, especially the richest
quartile (</span><span class='ecbx-1000'>0.13 </span><span class='ecrm-1000'>vs </span><span class='ecbx-1000'>0.39 </span><span class='ecrm-1000'>in data, a 26 percentage point error). This contradicts robust literature findings
that even wealthy households with ample liquidity exhibit high MPCs (</span><span class='ecbx-1000'>?</span><span class='ecrm-1000'>; </span><span class='ecbx-1000'>?</span><span class='ecrm-1000'>) and related literature
discussed in the main text, demonstrating that the splurge parameter is necessary for matching empirical
consumption dynamics, though it does not substantially affect policy rankings.</span>
